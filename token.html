<!DOCTYPE html>
<html data-theme="dark">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
<meta charset="UTF-8">
<title>Live Token Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

[data-theme="dark"]{
  --bg:     linear-gradient(135deg,#000000,#0a0f1e,#0f172a);
  --card:   rgba(30,41,59,0.8);
  --border: rgba(255,255,255,0.1);
  --text:   #fff;
  --sub:    rgba(255,255,255,0.6);
  --name:   #38bdf8;
  --topbar: rgba(0,0,0,0.3);
  --tbborder: rgba(255,255,255,0.08);
}
[data-theme="light"]{
  --bg:     linear-gradient(135deg,#f0f4ff,#e8eeff,#dde6ff);
  --card:   rgba(255,255,255,0.85);
  --border: rgba(99,102,241,0.2);
  --text:   #1e1b4b;
  --sub:    #6b7280;
  --name:   #6366f1;
  --topbar: rgba(255,255,255,0.4);
  --tbborder: rgba(99,102,241,0.15);
}

body{
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
  transition:background 0.3s;
}

/* ── TOPBAR ── */
.topbar{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px;
  background:var(--topbar);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--tbborder);
  position:sticky;
  top:0;
  z-index:50;
}
.topbar-left{ display:flex; align-items:center; gap:10px; }
.topbar-center{ position:absolute; left:50%; transform:translateX(-50%); text-align:center; }
#clock{ font-size:14px; color:var(--sub); font-variant-numeric:tabular-nums; white-space:nowrap; }
#weather{ font-size:13px; color:var(--sub); margin-top:2px; }

.tb-btn{
  padding:7px 14px;
  border-radius:8px;
  border:1px solid var(--tbborder);
  background:var(--card);
  color:var(--text);
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:5px;
  transition:background 0.2s;
}
.tb-btn:hover{ opacity:0.85; }

#themeBtn{
  width:38px; height:38px;
  border-radius:50%;
  border:1px solid var(--tbborder);
  background:var(--card);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.4s ease, background 0.3s;
}
#themeBtn.spin{ animation:spinOnce 0.5s ease; }
@keyframes spinOnce{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── GRID ── */
.grid-wrap{
  width:100%;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
}
.grid{
  width:100%;
  max-width:1200px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:30px 20px;
  text-align:center;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 40px rgba(0,0,0,0.3),0 0 20px rgba(59,130,246,0.1);
  transition:transform 0.4s ease, background 0.3s;
}
[data-theme="light"] .card{
  box-shadow:0 4px 24px rgba(99,102,241,0.12);
}
.card:hover{ transform:scale(1.03); }

.counter-name{
  font-size:28px;
  margin-bottom:16px;
  color:var(--name);
  font-weight:bold;
  letter-spacing:1px;
}
.token{
  font-size:110px;
  font-weight:bold;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1.1;
}
[data-theme="light"] .token{
  background:linear-gradient(90deg,#7c3aed,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.flash{ animation:flashAnim 0.9s ease forwards; }
@keyframes flashAnim{
  0%  { transform:scale(1);   filter:brightness(1);   }
  40% { transform:scale(1.3); filter:brightness(2.5); }
  100%{ transform:scale(1);   filter:brightness(1);   }
}

/* ── OVERLAYS ── */
.overlay-base{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
  gap:12px;
}
#unmuteOverlay{ cursor:pointer; }
.overlay-btn{
  background:#38bdf8;
  color:#000;
  font-size:20px;
  font-weight:bold;
  padding:16px 44px;
  border-radius:12px;
  letter-spacing:1px;
}
.overlay-sub{ font-size:14px; color:rgba(255,255,255,0.5); }

/* ── SETUP OVERLAY ── */
#setupOverlay{ z-index:1000; }
.setup-box{
  background:rgba(15,23,42,0.97);
  border:1px solid rgba(99,102,241,0.4);
  border-radius:16px;
  padding:32px 28px;
  width:90%;
  max-width:480px;
  text-align:center;
}
.setup-box h2{ font-size:22px; margin-bottom:8px; color:#38bdf8; }
.setup-box p{ font-size:13px; color:rgba(255,255,255,0.55); margin-bottom:20px; }
.setup-input{
  width:100%;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid rgba(99,102,241,0.5);
  background:rgba(255,255,255,0.06);
  color:#fff;
  font-size:13px;
  margin-bottom:12px;
  box-sizing:border-box;
}
.setup-input::placeholder{ color:rgba(255,255,255,0.3); }
.setup-input:focus{ outline:none; border-color:#38bdf8; }
.setup-save-btn{
  background:#6366f1;
  color:#fff;
  font-size:15px;
  font-weight:bold;
  padding:11px 32px;
  border-radius:9px;
  border:none;
  cursor:pointer;
  width:100%;
}
.setup-save-btn:hover{ background:#4f46e5; }
.setup-err{ color:#f87171; font-size:12px; margin-top:6px; min-height:18px; }

/* ── MOBILE ── */
@media(max-width:600px){
  .grid{ grid-template-columns:1fr; gap:20px; }
  .token{ font-size:80px; }
  .counter-name{ font-size:22px; }
  #clock{ font-size:11px; }
  .tb-btn{ font-size:11px; padding:5px 10px; }
  .topbar-center{ position:static; transform:none; text-align:center; flex:1; }
  .topbar{ flex-wrap:wrap; gap:6px; }
}
</style>
</head>
<body>

<div id="setupOverlay" class="overlay-base" style="display:none">
  <div class="setup-box">
    <h2>⚙️ Token Display Setup</h2>
    <p>The built-in GAS URL is pre-configured and works out of the box. Override it here if needed, or leave blank to use the default.</p>
    <input id="gasUrlInput" class="setup-input" type="url"
           placeholder="https://script.google.com/macros/s/.../exec"
           oninput="document.getElementById('setupErr').textContent=''">
    <button class="setup-save-btn" onclick="saveGasUrl()">Save &amp; Start</button>
    <div id="setupErr" class="setup-err"></div>
  </div>
</div>

<div id="unmuteOverlay" onclick="unlock()" class="overlay-base">
  <div class="overlay-sub">Tap anywhere to start token display</div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <a class="tb-btn" href="d.html" target="_blank" rel="noopener">🔐 Dashboard</a>
    <button class="tb-btn" onclick="openSetup()" title="Change GAS URL">⚙️</button>
  </div>
  <div class="topbar-center">
    <div id="clock"></div>
    <div id="weather"></div>
  </div>
  <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<script>
// ── GAS API URL ──
// Reads from localStorage (same key as d.html dashboard: gasUrl).
// Falls back to the built-in deployment URL so the display works out of the box.
// To override, click the ⚙️ button in the top-bar.
const LS_KEY = 'gasUrl';
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbyxhqVi3BPh_ksWRJ5n9TWLGBK8HbEhxqqwqV4Bfft7VJJlGxRWI9PPS4Zhw_aKN1TOQQ/exec';
let API = localStorage.getItem(LS_KEY) || DEFAULT_GAS_URL;

let lastUpdated  = {};
let initialized  = false;
let audioUnlocked = false;
let cbCount = 0;

/* ── SETUP OVERLAY ── */
function openSetup(){
  const overlay = document.getElementById('setupOverlay');
  // Show the current override (if any) — not the default, to keep it clear
  document.getElementById('gasUrlInput').value = localStorage.getItem(LS_KEY) || '';
  document.getElementById('setupErr').textContent = '';
  overlay.style.display = 'flex';
}
function saveGasUrl(){
  const val = document.getElementById('gasUrlInput').value.trim();
  // Allow empty = revert to built-in default
  if(val === ''){
    localStorage.removeItem(LS_KEY);
    API = DEFAULT_GAS_URL;
  } else {
    let parsed;
    try { parsed = new URL(val); } catch(e) { parsed = null; }
    if(!parsed || (parsed.protocol !== 'https:' && parsed.protocol !== 'http:')){
      document.getElementById('setupErr').textContent = 'Enter a valid https:// URL (or leave blank for default)';
      return;
    }
    API = val;
    localStorage.setItem(LS_KEY, API);
  }
  document.getElementById('setupOverlay').style.display = 'none';
  if(!audioUnlocked){
    document.getElementById('unmuteOverlay').style.display = 'flex';
  } else {
    load();
  }
}

/* ── CLOCK ── */
function updateClock(){
  const now = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  const time = String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+ampm;
  document.getElementById("clock").innerText = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}  ${time}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ── WEATHER ── */
function weatherEmoji(code, temp){
  if(code <= 1) return temp >= 30 ? "☀️" : "🌤️";
  if(code <= 3) return "⛅";
  if(code <= 48) return "🌫️";
  if(code <= 67) return "🌧️";
  if(code <= 77) return "❄️";
  if(code <= 82) return "🌦️";
  return "⛈️";
}

function loadWeather(){
  if(!navigator.geolocation){ return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat = pos.coords.latitude.toFixed(2);
    const lon = pos.coords.longitude.toFixed(2);
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`)
      .then(r=>r.json())
      .then(d=>{
        const temp = Math.round(d.current_weather.temperature);
        const code = d.current_weather.weathercode;
        const emoji = weatherEmoji(code, temp);
        document.getElementById("weather").innerText = `${emoji} ${temp}°C`;
      }).catch(()=>{});
  }, ()=>{});
}
loadWeather();

/* ── THEME ── */
const savedTheme = localStorage.getItem("displayTheme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
document.getElementById("themeBtn").innerText = savedTheme === "dark" ? "🌙" : "☀️";

function toggleTheme(){
  const btn = document.getElementById("themeBtn");
  btn.classList.remove("spin");
  void btn.offsetWidth;
  btn.classList.add("spin");
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("displayTheme", next);
  btn.innerText = next === "dark" ? "🌙" : "☀️";
}

/* ── JSONP ── */
function jsonp(params, callback){
  if(!API) return;
  // Validate API URL before using as script src to prevent DOM XSS
  let apiUrl;
  try { apiUrl = new URL(API); } catch(e) { console.warn('Token display: invalid GAS URL'); return; }
  if(apiUrl.protocol !== 'https:' && apiUrl.protocol !== 'http:') { console.warn('Token display: GAS URL must be http(s)'); return; }
  const cbName = "_cb" + (++cbCount);
  window[cbName] = function(data){
    delete window[cbName];
    const el = document.getElementById(cbName);
    if(el) document.head.removeChild(el);
    if(callback) callback(data);
  };
  params.callback = cbName;
  const qs = Object.entries(params).map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
  const s = document.createElement("script");
  s.id = cbName;
  // Use validated origin+pathname to prevent injection via stored URL
  s.src = apiUrl.origin + apiUrl.pathname + "?" + qs;
  // Timeout: if the script doesn't call back within 10s, clean up
  const timeout = setTimeout(function(){
    if(window[cbName]){ delete window[cbName]; }
    const el = document.getElementById(cbName);
    if(el) document.head.removeChild(el);
  }, 10000);
  s.onload = function(){ clearTimeout(timeout); };
  s.onerror = function(){
    clearTimeout(timeout);
    delete window[cbName];
    const el = document.getElementById(cbName);
    if(el) document.head.removeChild(el);
    console.warn('Token display: JSONP request failed. Check your GAS URL.');
  };
  document.head.appendChild(s);
}

/* ── UNLOCK + FULLSCREEN ── */
function unlock(){
  document.getElementById("unmuteOverlay").style.display = "none";

  // Fullscreen
  const el = document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();

  // Warm up audio
  const warm = new SpeechSynthesisUtterance(" ");
  warm.volume = 0;
  speechSynthesis.speak(warm);
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = ctx.createBuffer(1,1,22050);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.connect(ctx.destination); src.start(0);

  audioUnlocked = true;
  load();
}

/* ── BEEP ── */
function beep(){
  try{
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.6);
  }catch(e){}
}

/* ── VOICE ── */
function speak(msg){
  try{
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(msg);
    utt.lang="en-US"; utt.rate=0.9; utt.pitch=1; utt.volume=1;
    speechSynthesis.speak(utt);
  }catch(e){}
}

/* ── FLASH ── */
function triggerFlash(el){
  el.classList.remove("flash");
  void el.offsetWidth;
  el.classList.add("flash");
  el.addEventListener("animationend",()=>el.classList.remove("flash"),{once:true});
}

/* ── LOAD ── */
function load(){
  if(!audioUnlocked) return;
  jsonp({action:"getCountersPublic"}, function(data){
    if(!Array.isArray(data)) return;
    const grid = document.getElementById("grid");
    const rows = data.slice(1);
    const ids  = rows.map(r=>String(r[0]));

    rows.forEach(function(row, idx){
      const id      = String(row[0]);
      const name    = row[1];
      const num     = row[2];
      const updated = String(row[3]);
      const prefix  = row[4] ? String(row[4]) : String.fromCharCode(65+idx);
      const token   = prefix + num;

      if(!document.getElementById("card-"+id)){
        const card = document.createElement("div");
        card.className = "card";
        card.id = "card-"+id;
        card.innerHTML = `<div class="counter-name">${name}</div><div class="token" id="token-${id}">${token}</div>`;
        grid.appendChild(card);
      }

      const tokenEl = document.getElementById("token-"+id);
      if(tokenEl) tokenEl.innerText = token;

      if(initialized && lastUpdated[id]!==undefined && lastUpdated[id]!==updated){
        beep();
        speak("Token "+token+" please proceed to counter "+name);
        if(tokenEl) triggerFlash(tokenEl);
      }

      lastUpdated[id] = updated;
    });

    // Remove cards for counters that no longer exist
    Array.from(grid.children).forEach(function(card){
      if(!ids.includes(card.id.replace("card-",""))) grid.removeChild(card);
    });

    initialized = true;
  });
}

setInterval(function(){ if(audioUnlocked) load(); }, 3000);

// API is always set (built-in default), so go straight to the tap-to-start overlay.
// setupOverlay is only shown when the user clicks ⚙️ to override the URL.
</script>
</body>
</html>
